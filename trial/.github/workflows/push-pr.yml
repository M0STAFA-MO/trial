name: Node.js CI

on:
  push:
    branches:
      - main
    # Removed 'paths' temporarily so you can see it run when you push this file!
  pull_request:
    branches:
      - main

jobs:
  example-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print a welcome message
        run: echo "Welcome to GitHub Actions!"

      - name: Checkout repository
        uses: actions/checkout@v4 # Changed to v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use whatever version you are developing with

      - name: Run tests
        run: npm test